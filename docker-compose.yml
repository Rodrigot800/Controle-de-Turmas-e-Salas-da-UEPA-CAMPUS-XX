version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: unigestao_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: uniGestao
    ports:
      - "192.168.10.231:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/bancoSQL.SQL:/docker-entrypoint-initdb.d/01-bancoSQL.sql
      - ./Backend/insert.SQL:/docker-entrypoint-initdb.d/02-insert.sql
      - "./Backend/insert disciplinas e professores.SQL:/docker-entrypoint-initdb.d/03-insert.sql"
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    container_name: unigestao_backend
    ports:
      - "192.168.10.231:3001:3001"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: "123456"
      DB_NAME: uniGestao
      DB_PORT: 5432
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: unigestao_frontend
    ports:
      - "192.168.10.231:5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
