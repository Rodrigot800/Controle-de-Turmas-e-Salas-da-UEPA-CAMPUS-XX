version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: hydrazil_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "systemhidrazil@2026"
      POSTGRES_DB: hydrazil_db
    ports:
      - "192.168.10.231:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Backend/codeSQL/CreateTable.SQL:/docker-entrypoint-initdb.d/01-CreateTable.sql
      - ./Backend/codeSQL/Insert.SQL:/docker-entrypoint-initdb.d/02-Insert.sql
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
    container_name: hydrazil_backend
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: "systemhidrazil@2026"
      DB_NAME: hydrazil_db
      DB_PORT: 5432
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: hydrazil_frontend
    ports:
      - "192.168.10.231:443:443"
      - "192.168.10.231:3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
